site_name: PVE Cloud Documentation

nav:
  - index.md
  - Proxmox Setup:
    - proxmox-setup/arch.md
    - proxmox-setup/demo.md
    - proxmox-setup/extensible.md
  - cloud-arch.md
  - bootstrap.md
  - kubernetes.md
  - terraform.md
  - faq.md
  - contributing.md
  - tdd.md
  - Schemas:
    - schemas

theme:
  name: material
  palette:
    scheme: default
  features:
    - toc.follow
    - toc.integrate
    - search.suggest
    - content.code.copy

plugins:
  - search
  - include_dir_to_nav
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
      theme:
        dark: material/indigo-dark